<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Dashboard</title>
    <script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #0f1117;
            --ink-soft: #3d4252;
            --ink-muted: #7c8296;
            --ink-ghost: #b0b6c8;
            --surface: #ffffff;
            --surface-2: #f4f6fb;
            --surface-3: #eef1f8;
            --border: #e3e8f3;
            --brand: #5b7cff;
            --brand-2: #8b5cf6;
            --green: #22c55e;
            --orange: #f59e0b;
            --red: #ef4444;
            --cyan: #3b82f6;
            --shadow-xs: 0 1px 2px rgba(15, 17, 23, .04);
            --shadow-sm: 0 8px 24px rgba(15, 17, 23, .06);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --tr: 200ms cubic-bezier(.4, 0, .2, 1);
            --font: "DM Sans", sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--surface-2);
            color: var(--ink);
            min-height: 100vh;
            overflow: hidden;
        }

        .topbar {
            height: 60px;
            border-bottom: 1px solid var(--border);
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: #fff;
            font-size: 14px;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            box-shadow: 0 4px 12px rgba(91, 124, 255, .3);
        }

        .title {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -.2px;
        }

        .subtitle {
            font-size: 12px;
            color: var(--ink-muted);
        }

        .btn {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--ink-soft);
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 600;
            padding: 8px 14px;
            cursor: pointer;
            transition: var(--tr);
        }

        .btn:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .btn.primary {
            background: var(--brand);
            color: #fff;
            border: none;
        }

        .loading-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            height: 2px;
            display: none;
            z-index: 150;
            background: linear-gradient(90deg, var(--brand), var(--brand-2), var(--brand));
            background-size: 200% 100%;
            animation: bar 1.2s linear infinite;
        }

        .loading-bar.on {
            display: block;
        }

        @keyframes bar {
            0% {
                background-position: 180% 0;
            }

            100% {
                background-position: -180% 0;
            }
        }

        .app {
            height: calc(100vh - 60px);
            overflow-y: auto;
            padding: 24px;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xs);
            transition: var(--tr);
            overflow: hidden;
        }

        .card:hover {
            box-shadow: var(--shadow-sm);
            border-color: #dbe4ff;
        }

        .kpi-card {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .kpi-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .kpi-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-muted);
        }

        .kpi-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--ink);
        }

        .kpi-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-2);
        }

        .kpi-icon.blue {
            color: #3b82f6;
            background: #eff6ff;
        }

        .kpi-icon.orange {
            color: #f59e0b;
            background: #fffbeb;
        }

        .kpi-icon.green {
            color: #22c55e;
            background: #f0fdf4;
        }

        .card-head {
            padding: 18px 20px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--ink-soft);
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-holder {
            min-height: 280px;
            padding: 0 12px 12px;
        }

        .list {
            padding: 0 12px 12px;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: var(--tr);
        }

        .list-item:hover {
            background: var(--surface-2);
            border-color: var(--border);
        }

        .li-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .li-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }

        .li-texts {
            min-width: 0;
        }

        .li-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .li-sub {
            font-size: 11px;
            color: var(--ink-muted);
            margin-top: 1px;
        }

        .li-badge {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            white-space: nowrap;
        }

        .li-badge span {
            color: #94a3b8;
            margin-right: 4px;
            font-weight: 500;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-wrap {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 10px 12px 10px 38px;
            font-size: 13px;
            font-family: var(--font);
            outline: none;
            transition: var(--tr);
        }

        .search-input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(91, 124, 255, .1);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-ghost);
        }

        .select {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font);
            color: var(--ink-soft);
            background: #fff;
            outline: none;
            cursor: pointer;
        }

        .tiny-btn {
            border: none;
            background: none;
            color: var(--brand);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .tiny-btn:hover {
            background: #eff6ff;
        }

        .err {
            display: none;
            padding: 12px;
            background: #fef2f2;
            color: #b91c1c;
            border-radius: var(--radius-md);
            border: 1px solid #fecaca;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
        }

        .err.show {
            display: block;
        }

        @media (max-width: 1024px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .kpi-card {
                flex: 1;
                min-width: 240px;
            }

            .sidebar .card {
                flex: 1;
                min-width: 320px;
            }
        }
    </style>
</head>

<body>
    <div class="loading-bar" id="loadingBar"></div>

    <header class="topbar">
        <div class="top-left">
            <div class="logo">📊</div>
            <div>
                <div class="title">Branch Dashboard</div>
                <div class="subtitle" id="branchSubtitle">Loading...</div>
            </div>
        </div>
        <div class="top-actions">
            <button class="btn" onclick="refreshData()">Refresh</button>
            <button class="btn primary" onclick="exportOverviewCsv()">Export Summary</button>
        </div>
    </header>

    <main class="app">
        <div class="err" id="globalErr"></div>

        <section class="toolbar">
            <div class="search-wrap">
                <span class="search-icon">⌕</span>
                <input class="search-input" id="searchInput" type="text" placeholder="Search orders, tickets..."
                    oninput="handleSearch(this.value)">
            </div>
            <select class="select" id="dateFilter" onchange="onFilterChange()">
                <option value="all">Date: All Time</option>
                <option value="today">Today</option>
                <option value="7d">Last 7 Days</option>
                <option value="30d">Last 30 Days</option>
                <option value="month">This Month</option>
            </select>
            <select class="select" id="branchFilter" onchange="onFilterChange()">
                <option value="">Branch: All</option>
            </select>
            <button class="btn" onclick="clearFilters()">Clear</button>
        </section>

        <section class="dashboard-layout">
            <!-- Sidebar: KPIs + Tickets -->
            <aside class="sidebar">
                <article class="card kpi-card">
                    <div class="kpi-info">
                        <div class="kpi-label">Total Orders</div>
                        <div class="kpi-value" id="kpiOrders">0</div>
                    </div>
                    <div class="kpi-icon blue">📦</div>
                </article>

                <article class="card kpi-card">
                    <div class="kpi-info">
                        <div class="kpi-label">Pending Orders</div>
                        <div class="kpi-value" id="kpiPending">0</div>
                    </div>
                    <div class="kpi-icon orange">⏳</div>
                </article>

                <article class="card kpi-card">
                    <div class="kpi-info">
                        <div class="kpi-label">Open Tickets</div>
                        <div class="kpi-value" id="kpiTickets">0</div>
                    </div>
                    <div class="kpi-icon green">🎫</div>
                </article>

                <article class="card">
                    <div class="card-head">
                        <div class="card-title">Tickets Overview</div>
                        <div class="card-actions">
                            <button class="tiny-btn" onclick="exportChartCsv('ticketStatus')">Export</button>
                        </div>
                    </div>
                    <div class="chart-holder" id="ticketStatusChart"></div>
                </article>
            </aside>

            <!-- Main Content: Orders + Products -->
            <section class="main-content">
                <article class="card">
                    <div class="card-head">
                        <div class="card-title">Orders Overview</div>
                        <div class="card-actions">
                            <button class="tiny-btn" onclick="exportChartCsv('ordersOverview')">Export</button>
                        </div>
                    </div>
                    <div class="chart-holder" id="ordersOverviewChart"></div>
                </article>

                <article class="card">
                    <div class="card-head">
                        <div class="card-title">Order Products</div>
                        <div class="card-actions">
                            <button class="tiny-btn" onclick="exportChartCsv('topProducts')">View All</button>
                        </div>
                    </div>
                    <div class="list" id="topProductsList"></div>
                </article>
            </section>
        </section>
    </main>

    <div class="toast-shelf" id="toasts"></div>

    <script>
        const CFG = {
            appName: "order-management",
            reports: {
                orders: "All_Orders",
                tickets: "All_Tickets",
                products: "All_Products",
                branches: "All_Branches",
                assets: "All_Asset_Types",
                roles: "All_Branch_User_Role_Mapping"
            },
            fields: {
                order: {
                    id: "Order_ID",
                    date: "order_date",
                    status: "Status",
                    branch: "Branch",
                    products: "Products_Selection",
                    subform: { product: "Product", qty: "Ordered_Qty" }
                },
                ticket: { id: "Ticket_ID", status: "Status", date: "Added_Time", branch: "Branch" },
                product: { name: "Product_Name" }
            },
            branchField: "Branch_Name",
            batch: 200
        };

        const S = {
            user: { email: "", role: "", authorizedBranchIds: [], isSuperAdmin: false },
            all: { orders: [], tickets: [], products: [], branches: [] },
            map: { branchById: new Map(), productById: new Map() },
            filters: { search: "", date: "all", branchId: "" },
            filtered: { orders: [], tickets: [] },
            csv: { ordersOverview: [], topProducts: [], ticketStatus: [], overview: [] },
            charts: { ordersOverview: null, ticketStatus: null }
        };

        async function fetchAll(reportName) {
            let out = [], page = 1;
            try {
                while (true) {
                    const res = await ZOHO.CREATOR.API.getAllRecords({
                        appName: CFG.appName, reportName, page, pageSize: CFG.batch
                    });
                    const rows = res?.data || [];
                    out = out.concat(rows);
                    if (rows.length < CFG.batch) break;
                    page++;
                }
            } catch (e) { console.error("Fetch failed:", reportName, e); }
            return out;
        }

        async function initAuth() {
            try {
                const params = await ZOHO.CREATOR.UTIL.getInitParams() || {};
                S.user.email = (params.loginUser || "").toLowerCase().trim();

                const mappings = await fetchAll(CFG.reports.roles);
                const userMappings = mappings.filter(m => {
                    const u = m.User;
                    const email = (typeof u === "string" ? u : (u.email || u.display_value || "")).toLowerCase().trim();
                    return email === S.user.email;
                });

                if (userMappings.length > 0) {
                    S.user.role = userMappings[0].Role;
                    S.user.isSuperAdmin = S.user.role === "Super Admin";
                    userMappings.forEach(m => {
                        const b = m.Branch || m.Branches;
                        if (!b) return;
                        if (Array.isArray(b)) b.forEach(i => S.user.authorizedBranchIds.push(lookupId(i)));
                        else S.user.authorizedBranchIds.push(lookupId(b));
                    });
                }
                document.getElementById("branchSubtitle").textContent = S.user.isSuperAdmin ? "Super Admin" : `Authorized for ${S.user.authorizedBranchIds.length} branch(es)`;
                return true;
            } catch (e) { showErr("Auth check failed: " + e.message); return false; }
        }

        async function loadData() {
            setLoading(true);
            try {
                const [branches, products, orders, tickets] = await Promise.all([
                    fetchAll(CFG.reports.branches),
                    fetchAll(CFG.reports.products),
                    fetchAll(CFG.reports.orders),
                    fetchAll(CFG.reports.tickets)
                ]);

                S.all.branches = branches;
                S.all.products = products;
                S.map.branchById = new Map(branches.map(b => [String(b.ID), b[CFG.branchField] || "—"]));
                S.map.productById = new Map(products.map(p => [String(p.ID), p[CFG.productField] || "—"]));

                if (orders.length > 0) {
                    console.log("DIAGNOSTIC: First Order ID:", orders[0][CFG.fields.order.id]);
                    console.log("DIAGNOSTIC: Order Field Keys:", Object.keys(orders[0]));
                    console.log("DIAGNOSTIC: Products Subform Content:", orders[0][CFG.fields.order.products]);
                }

                if (S.user.isSuperAdmin) {
                    S.all.orders = orders;
                    S.all.tickets = tickets;
                } else {
                    const authIds = new Set(S.user.authorizedBranchIds);
                    S.all.orders = orders.filter(o => authIds.has(lookupId(o[CFG.fields.order.branch])));
                    S.all.tickets = tickets.filter(t => authIds.has(lookupId(t[CFG.fields.ticket.branch])));
                }

                console.log("DIAGNOSTIC: Filtered Orders Count:", S.all.orders.length);

                populateBranchFilter();
                recompute();
            } catch (e) { showErr("Load failed: " + e.message); }
            finally { setLoading(false); }
        }


        function populateBranchFilter() {
            const bSel = document.getElementById("branchFilter");
            const authorized = S.user.isSuperAdmin ? S.all.branches : S.all.branches.filter(b => S.user.authorizedBranchIds.includes(String(b.ID)));
            bSel.innerHTML = `<option value="">Branch: All</option>` + authorized.map(b => `<option value="${b.ID}">${esc(b[CFG.branchField])}</option>`).join("");
        }

        function recompute() {
            const fO = CFG.fields.order;
            const fT = CFG.fields.ticket;
            const q = S.filters.search.toLowerCase();

            S.filtered.orders = S.all.orders.filter(o => {
                if (!isInRange(parseDate(o[fO.date] || o.Added_Time), S.filters.date)) return false;
                if (S.filters.branchId && lookupId(o[fO.branch]) !== S.filters.branchId) return false;
                if (q && ![o[fO.id], S.map.branchById.get(lookupId(o[fO.branch]))].join(" ").toLowerCase().includes(q)) return false;
                return true;
            });

            S.filtered.tickets = S.all.tickets.filter(t => {
                if (!isInRange(parseDate(t[fT.date]), S.filters.date)) return false;
                if (S.filters.branchId && lookupId(t[fT.branch]) !== S.filters.branchId) return false;
                if (q && ![t[fT.id], S.map.branchById.get(lookupId(t[fT.branch]))].join(" ").toLowerCase().includes(q)) return false;
                return true;
            });

            renderKpis();
            renderCharts();
            renderProductList();
        }

        function renderKpis() {
            const orders = S.filtered.orders.length;
            const pending = S.filtered.orders.filter(o => normalizeStatus(o[CFG.fields.order.status]) === "Pending").length;
            const tickets = S.filtered.tickets.filter(t => normalizeStatus(t[CFG.fields.ticket.status]) === "Open" || normalizeStatus(t[CFG.fields.ticket.status]) === "Pending").length;

            animateValue("kpiOrders", orders);
            animateValue("kpiPending", pending);
            animateValue("kpiTickets", tickets);
        }

        function renderCharts() {
            renderOrdersOverview();
            renderTicketsDonut();
        }

        function renderOrdersOverview() {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const series = [
                { name: "Delivered", data: Array(12).fill(0), color: "#22c55e" },
                { name: "Partial", data: Array(12).fill(0), color: "#3b82f6" },
                { name: "Pending", data: Array(12).fill(0), color: "#f59e0b" },
                { name: "Cancelled", data: Array(12).fill(0), color: "#ef4444" }
            ];

            console.log("Rendering Orders Overview. Total Filtered Orders:", S.filtered.orders.length);
            S.filtered.orders.forEach(o => {
                const d = parseDate(o[CFG.fields.order.date] || o.Added_Time);
                if (!d) return;
                const m = d.getMonth();
                let s = normalizeStatus(o[CFG.fields.order.status]);

                // Map data status to UI status
                if (s === "Partial Sent") s = "Partial";

                const ser = series.find(x => x.name === s);
                if (ser) ser.data[m]++;
            });


            mountChart("ordersOverview", "ordersOverviewChart", {
                chart: { type: "bar", height: 300, toolbar: { show: false }, stacked: false },
                plotOptions: { bar: { horizontal: false, columnWidth: "55%", borderRadius: 4 } },
                dataLabels: { enabled: false },
                stroke: { show: true, width: 2, colors: ["transparent"] },
                xaxis: { categories: months },
                yaxis: { title: { text: "Orders" } },
                fill: { opacity: 1 },
                series: series,
                tooltip: { y: { formatter: val => val + " Orders" } }
            });
        }

        function renderTicketsDonut() {
            const map = {};
            S.filtered.tickets.forEach(t => {
                const s = normalizeStatus(t[CFG.fields.ticket.status]);
                if (!s) return;
                map[s] = (map[s] || 0) + 1;
            });
            const labels = Object.keys(map), data = Object.values(map);
            mountChart("ticketStatus", "ticketStatusChart", {
                chart: { type: "donut", height: 280 },
                labels: labels,
                series: data,
                colors: ["#90e0ab", "#b3e5fc", "#ffcc80", "#ffab91", "#e0e0e0"],
                legend: { position: "right", offsetY: 20 },
                plotOptions: { pie: { donut: { size: "70%" } } },
                dataLabels: { enabled: false }
            });
        }

        function renderProductList() {
            const totals = new Map();
            console.log("Rendering Product List. Filtered Orders:", S.filtered.orders.length);

            S.filtered.orders.forEach((o) => {
                const lines = Array.isArray(o.Products_Selection) ? o.Products_Selection : [];

                lines.forEach(l => {
                    const dv = l.display_value || "";
                    if (!dv) return;

                    // Parse comma-separated display value: Product, Asset, Brand, Qty, ...
                    const parts = dv.split(",").map(p => p.trim());

                    if (parts.length >= 4) {
                        const name = parts[0];
                        const qty = parseInt(parts[3], 10) || 0;

                        if (name && qty > 0) {
                            totals.set(name, (totals.get(name) || 0) + qty);
                        }
                    } else {
                        console.warn("Unexpected subform display format:", dv);
                    }
                });
            });

            console.log("Product Totals Map Size:", totals.size);
            const sorted = [...totals.entries()].sort((a, b) => b[1] - a[1]).slice(0, 10);

            const html = sorted.map(x => `
                <div class="list-item">
                    <div class="li-info">
                        <div class="li-icon">📦</div>
                        <div class="li-texts">
                            <div class="li-name">${esc(x[0])}</div>
                            <div class="li-sub">Units from branch orders</div>
                        </div>
                    </div>
                    <div class="li-badge"><span>Order</span> ${x[1]}</div>
                </div>
            `).join("");

            document.getElementById("topProductsList").innerHTML = html || `<div style="height:150px;display:grid;place-items:center;color:#94a3b8;font-size:13px">No product data found in filtered orders</div>`;

            // Build CSV data
            S.csv.topProducts = sorted.map(x => ({
                Product: x[0],
                Units: x[1]
            }));
        }



        // Utils
        function lookupId(v) { if (!v) return ""; if (typeof v === "object") return String(v.ID || v.value || v.id || ""); return String(v); }
        function normalizeStatus(s) { if (typeof s === "object") return (s.display_value || s.value || "Unknown").trim(); return String(s || "Unknown").trim(); }
        function parseDate(v) { if (!v) return null; const d = new Date(v); return isNaN(d) ? null : d; }
        function isInRange(d, range) {
            if (range === "all") return true;
            if (!d) return false;
            const now = new Date(), today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
            if (range === "today") return target.getTime() === today.getTime();
            if (range === "7d") { const x = new Date(today); x.setDate(x.getDate() - 7); return target >= x; }
            if (range === "30d") { const x = new Date(today); x.setDate(x.getDate() - 30); return target >= x; }
            if (range === "month") return target.getMonth() === today.getMonth() && target.getFullYear() === today.getFullYear();
            return true;
        }
        function mountChart(key, elId, opts) {
            if (S.charts[key]) S.charts[key].destroy();
            const el = document.getElementById(elId);
            if (!opts.series.length || (opts.series[0]?.data && !opts.series.some(s => s.data.some(d => d > 0)))) {
                el.innerHTML = `<div style="height:200px;display:grid;place-items:center;color:#94a3b8;font-size:13px">No data to display</div>`;
                return;
            }
            const c = new ApexCharts(el, opts); c.render(); S.charts[key] = c;
        }
        function animateValue(id, target) {
            const el = document.getElementById(id);
            const start = parseInt(el.textContent) || 0;
            const dur = 600; const startTime = performance.now();
            function step(now) {
                const p = Math.min((now - startTime) / dur, 1);
                el.textContent = Math.floor(start + (target - start) * p).toLocaleString();
                if (p < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }
        function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        function showErr(m) { const e = document.getElementById("globalErr"); e.textContent = m; e.classList.toggle("show", !!m); }
        function setLoading(v) { document.getElementById("loadingBar").classList.toggle("on", v); }

        // Handlers
        function onFilterChange() { S.filters.date = document.getElementById("dateFilter").value; S.filters.branchId = document.getElementById("branchFilter").value; recompute(); }
        let _st; function handleSearch(v) { clearTimeout(_st); _st = setTimeout(() => { S.filters.search = v; recompute(); }, 200); }
        function clearFilters() { document.getElementById("searchInput").value = ""; document.getElementById("dateFilter").value = "all"; document.getElementById("branchFilter").value = ""; S.filters = { search: "", date: "all", branchId: "" }; recompute(); }
        function refreshData() { loadData(); }

        async function start() {
            await ZOHO.CREATOR.init();
            if (await initAuth()) await loadData();
        }
        start();
    </script>
</body>
