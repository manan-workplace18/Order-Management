            let rec = defaultRec;
            try {
                const resp = await ZOHO.CREATOR.API.getRecordById({
                    appName: CFG.appName, reportName: CFG.orderReport, id: recordId
                });
                if (resp && resp.data) {
                    rec = resp.data;
                    S.drawerRec = rec;
                }
            } catch (e) { }

            const lines = Array.isArray(rec[f.products]) ? rec[f.products] : [];
            const ptbl = lines.length > 0
                ? `<table class="products-tbl">
            <thead><tr><th>#</th><th>Product</th><th>Brand</th><th>Asset Type</th><th>Ordered Qty</th></tr></thead>
            <tbody>${lines.map((l, i) => {
                    const sf = f.sf;
                    return `<tr>
                    <td><span class="sn-mono">${i + 1}</span></td>
                    <td style="font-weight:600;color:var(--ink);">${esc(productName(lookupId(l[sf.product])))}</td>
                    <td>${esc(brandName(lookupId(l[sf.brand])))}</td>
                    <td>${esc(assetName(lookupId(l[sf.assetType])))}</td>
                    <td><span class="qty-badge">${l[sf.qty] ?? 0}</span></td>
                </tr>`;
                }).join("")}</tbody>
           </table>`
                : `<div style="padding:24px;text-align:center;font-size:13px;color:var(--ink-muted);">No products in this order</div>`;

            document.getElementById("drawerBody").innerHTML = `
        <div class="stat-cards">
            <div class="stat-card">
                <div class="stat-lbl">Total Items</div>
                <div class="stat-val">${lines.length}</div>
                <div class="stat-sub">product lines</div>
            </div>
            <div class="stat-card sc-2">
                <div class="stat-lbl">Branch</div>
                <div class="stat-val" style="font-size:14px;letter-spacing:0;font-weight:600;margin-top:4px;">${esc(branchName(rec[f.branch]))}</div>
                <div class="stat-sub">assigned branch</div>
            </div>
        </div>

        <div class="d-sec">
            <div class="d-sec-hdr">
                <div class="d-sec-hdr-icon">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </div>
                <div class="d-sec-title">Order Details</div>
            </div>
            <div class="d-grid">
                <div><div class="d-lbl">Order ID</div><div class="d-val mono">${esc(rec[f.orderId] || "—")}</div></div>
                <div><div class="d-lbl">Order Date</div><div class="d-val">${fmtDate(rec[f.date])}</div></div>
                <div><div class="d-lbl">Status</div><div class="d-val"><span class="badge ${statusClass(status)}">${esc(status)}</span></div></div>
                <div><div class="d-lbl">Branch</div><div class="d-val">${esc(branchName(rec[f.branch]))}</div></div>
                ${rec[f.manual] ? `<div class="d-field-full"><div class="d-lbl">Manual Request</div><div class="d-val" style="white-space:pre-wrap;">${esc(rec[f.manual])}</div></div>` : ""}
            </div>
        </div>

        <div class="d-sec">
            <div class="d-sec-hdr">
                <div class="d-sec-hdr-icon">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                </div>
                <div class="d-sec-title">Products (${lines.length})</div>
            </div>
            ${ptbl}
        </div>

        <div class="d-sec">
            <div class="d-sec-hdr">
                <div class="d-sec-hdr-icon">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div class="d-sec-title">Record Info</div>
            </div>
            <div class="d-grid">
                <div class="d-field-full"><div class="d-lbl">Record ID</div><div class="d-val mono">${esc(String(rec.ID))}</div></div>
                ${rec.Added_Time ? `<div><div class="d-lbl">Created</div><div class="d-val">${esc(rec.Added_Time)}</div></div>` : ""}
                ${rec.Modified_Time ? `<div><div class="d-lbl">Modified</div><div class="d-val">${esc(rec.Modified_Time)}</div></div>` : ""}
            </div>
        </div>`;
        }

        function closeDrawer() {
            document.getElementById("drawerOv").classList.remove("open");
            document.querySelectorAll("tbody tr").forEach(r => r.classList.remove("selected"));
            S.drawerRec = null;
        }
        function handleDrawerOvClick(e) { if (e.target === document.getElementById("drawerOv")) closeDrawer(); }
        function editFromDrawer() {
            if (S.drawerRec) { const id = S.drawerRec.ID; closeDrawer(); openEdit(id); }
        }
        function deleteFromDrawer() {
            if (S.drawerRec) { const id = S.drawerRec.ID; closeDrawer(); confirmDelete(id); }
        }

        // ─────────────────────────────────────────────
        // ADD / EDIT MODAL
        // ─────────────────────────────────────────────
        function todayISO() { return new Date().toISOString().split("T")[0]; }

        function openAdd() {
            S.editId = null; S.modalRows = [];
            document.getElementById("modalTitle").textContent = "Add Order";
            document.getElementById("submitTxt").textContent = "Add Order";
            document.getElementById("fDate").value = todayISO();
            document.getElementById("fStatus").value = "Pending";
            document.getElementById("fBranch").value = "";
            document.getElementById("fManual").value = "";
            renderSubform(); hideFormErr();
            document.getElementById("modalOv").classList.add("open");
        }

        async function openEdit(id) {
            const o = S.all.find(x => String(x.ID) === String(id));
            if (!o) return;
            const f = CFG.f;
            S.editId = id;

            let dateVal = "";
            if (o[f.date]) {
                try { const d = new Date(o[f.date]); if (!isNaN(d)) dateVal = d.toISOString().split("T")[0]; }
                catch { }
            }

            document.getElementById("fDate").value = dateVal;
            document.getElementById("fStatus").value = o[f.status] || "Pending";
            document.getElementById("fBranch").value = lookupId(o[f.branch]);
            document.getElementById("fManual").value = o[f.manual] || "";

            // Open modal immediately with basic fields
            S.modalRows = [];
            document.getElementById("modalTitle").textContent = "Edit Order";
            document.getElementById("submitTxt").textContent = "Update Order";
            document.getElementById("subformWrap").innerHTML =
                `<div class="sf-empty" style="font-size:13px;color:var(--ink-muted);">Loading products…</div>`;
            hideFormErr();
            document.getElementById("modalOv").classList.add("open");

            // Fetch the full record to get subform (Products_Selection) rows
            setLoading(true);
            try {
                const resp = await ZOHO.CREATOR.API.getRecordById({
                    appName: CFG.appName,
                    reportName: CFG.orderReport,
                    id: id
                });
                const full = resp?.data;
                const lines = full && Array.isArray(full[f.products]) ? full[f.products] : [];
                S.modalRows = lines.map(l => ({
                    rowId: String(l.ID || ""),
                    productId: lookupId(l[f.sf.product]),
                    brandId: lookupId(l[f.sf.brand]),
                    assetId: lookupId(l[f.sf.assetType]),
                    qty: String(l[f.sf.qty] ?? "")
                }));
            } catch (e) {
                // Fall back to whatever's in S.all (may be empty for subform)
                const lines = Array.isArray(o[f.products]) ? o[f.products] : [];
                S.modalRows = lines.map(l => ({
                    rowId: String(l.ID || ""),
                    productId: lookupId(l[f.sf.product]),
                    brandId: lookupId(l[f.sf.brand]),
                    assetId: lookupId(l[f.sf.assetType]),
                    qty: String(l[f.sf.qty] ?? "")
                }));
            } finally {
                setLoading(false);
                renderSubform();
            }
        }


        function closeModal() {
            document.getElementById("modalOv").classList.remove("open");
            S.editId = null; S.modalRows = [];
        }
        function handleModalOvClick(e) { if (e.target === document.getElementById("modalOv")) closeModal(); }

        async function submitForm() {
            const date = document.getElementById("fDate").value;
            const status = document.getElementById("fStatus").value;
            const branch = document.getElementById("fBranch").value;

            if (!date) { showFormErr("Order Date is required."); return; }
            if (!branch) { showFormErr("Branch is required."); return; }
            if (S.modalRows.length === 0) { showFormErr("Please add at least one product row."); return; }

            for (let i = 0; i < S.modalRows.length; i++) {
                const r = S.modalRows[i];
                if (!r.productId) { showFormErr(`Row ${i + 1}: select a Product.`); return; }
                if (!r.qty || parseInt(r.qty, 10) < 1) { showFormErr(`Row ${i + 1}: Ordered Qty must be ≥ 1.`); return; }
            }

            const sf = CFG.f.sf;
            const productsData = S.modalRows.map(r => {
                const row = {};
                if (r.rowId) row.ID = r.rowId;
                row[sf.product] = r.productId;
                if (r.brandId) row[sf.brand] = r.brandId;
                if (r.assetId) row[sf.assetType] = r.assetId;
                row[sf.qty] = parseInt(r.qty, 10);
                return row;
            });

            const ff = CFG.f;
            const data = {};
            data[ff.date] = date;
            data[ff.status] = status;
            data[ff.branch] = branch;
            data[ff.products] = productsData;
            const manual = document.getElementById("fManual").value.trim();
            if (manual) data[ff.manual] = manual;

            document.getElementById("submitBtn").disabled = true;
            setLoading(true);
            try {
                if (S.editId) {
                    await ZOHO.CREATOR.API.updateRecord({
                        appName: CFG.appName, reportName: CFG.orderReport,
                        id: S.editId, data: { data }
                    });
                    const idx = S.all.findIndex(x => String(x.ID) === String(S.editId));
                    if (idx !== -1) S.all[idx] = { ...S.all[idx], ...data };
                    toast("Order updated ✓", "ok");
                } else {
                    const r = await ZOHO.CREATOR.API.addRecord({
                        appName: CFG.appName, formName: CFG.orderForm, data: { data }
                    });
                    S.all.unshift({ ID: r?.data?.ID ?? ("tmp_" + Date.now()), ...data });
                    toast("Order added ✓", "ok");
                }
                closeModal();
                recompute();
            } catch (err) {
                const msg = err?.message || err?.error || (typeof err === "string" ? err : JSON.stringify(err));
                showFormErr(msg || "Save failed");
                toast("Error saving order", "err");
            } finally {
                document.getElementById("submitBtn").disabled = false;
                setLoading(false);
            }
        }

        // ─────────────────────────────────────────────
        // DELETE
        // ─────────────────────────────────────────────
        function confirmDelete(id) {
            S.delId = id;
            document.getElementById("delModalOv").classList.add("open");
        }
        function closeDelModal() {
            document.getElementById("delModalOv").classList.remove("open");
            S.delId = null;
        }
        function handleDelModalOvClick(e) { if (e.target === document.getElementById("delModalOv")) closeDelModal(); }

        async function doDelete() {
            if (!S.delId) return;
            const id = S.delId;
            closeDelModal(); setLoading(true);
            try {
                await ZOHO.CREATOR.API.deleteRecord({
                    appName: CFG.appName, reportName: CFG.orderReport, criteria: `(ID == ${id})`
                });
                S.all = S.all.filter(o => String(o.ID) !== String(id));
                toast("Order deleted", "ok");
                closeDrawer(); recompute();
            } catch (e) {
                const msg = e?.message || e?.error || e?.responseText || (typeof e === "string" ? e : JSON.stringify(e));
                toast("Delete failed: " + msg, "err");
            } finally {
                setLoading(false);
            }
        }

        // ─────────────────────────────────────────────
        // UI UTILITIES
        // ─────────────────────────────────────────────
        function setLoading(v) { document.getElementById("loadingBar").classList.toggle("active", v); }
        function showErr(msg) { document.getElementById("gErrText").textContent = msg; document.getElementById("gErr").classList.add("show"); }
        function hideErr() { document.getElementById("gErr").classList.remove("show"); }
        function showFormErr(m) { const e = document.getElementById("formErr"); e.textContent = m; e.classList.add("show"); }
        function hideFormErr() { document.getElementById("formErr").classList.remove("show"); }

        function toast(msg, type = "ok") {
            const shelf = document.getElementById("toasts");
            const t = document.createElement("div");
            t.className = `toast ${type}`;
            t.innerHTML = `<span class="dot"></span>${esc(msg)}`;
            shelf.appendChild(t);
            setTimeout(() => { t.style.cssText = "opacity:0;transform:translateY(6px);transition:.22s"; setTimeout(() => t.remove(), 240); }, 3000);
        }
        function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
        function escA(s) { return String(s).replace(/'/g, "\\'"); }

        // ─────────────────────────────────────────────
        // BOOT
        // ─────────────────────────────────────────────
        async function init() {
            document.getElementById("addBtn").addEventListener("click", openAdd);
            document.addEventListener("click", () => closeDropdowns());
            document.addEventListener("keydown", e => {
                if (e.key !== "Escape") return;
                closeModal(); closeDrawer(); closeDropdowns(); closeDelModal();
            });
            try {
                await ZOHO.CREATOR.init();
                await loadAll();
            } catch (e) {
                showErr("SDK init failed: " + (e?.message ?? String(e)));
                document.getElementById("tbody").innerHTML = `<tr><td colspan="7"><div class="t-empty">
            <div class="t-empty-icon">⚠️</div>
            <div class="t-empty-title">SDK initialisation failed</div>
            <div class="t-empty-sub">${esc(e?.message ?? String(e))}</div>
        </div></td></tr>`;
            }
        }
        document.readyState === "loading"
            ? document.addEventListener("DOMContentLoaded", init)
            : init();
    </script>
</body>

</html>
